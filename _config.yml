# Welcome to Jekyll!
title: Pedro Pinto
email: your-email@example.com
description: "Engenheiro Electrotécnico - Personal Portfolio"
minimal_mistakes_skin: default # Try 'dark', 'contrast', or 'air' if you want to experiment
search: false # Disabled since there is only one page to search

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

# Exclude completely unused folders
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/

# Plugins (Kept minimal)
plugins:
  - jekyll-include-cache

# Sidebar Profile
author:
  name   : "Pedro Pinto"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Engenheiro Electrotécnico"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/your_username"
    - label: "Curriculum Vitae"
      icon: "fas fa-fw fa-file-pdf"
      url: "/assets/cv.pdf"

# Footer Links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/your_username"

# Front Matter Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true # Keeps your bio sidebar visible on the home page
